<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Manhwa{% endblock %} — Laziness Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/chrome/topbar.js" defer></script>
  <style>
    :root {
      color-scheme: light dark;
      --lc-bg:      #fafafa;
      --lc-surface: #ffffff;
      --lc-border:  #e5e5e5;
      --lc-text:    #171717;
      --lc-muted:   #737373;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --lc-bg:      #0a0a0a;
        --lc-surface: #171717;
        --lc-border:  #262626;
        --lc-text:    #f5f5f5;
        --lc-muted:   #737373;
      }
    }
    body { background: var(--lc-bg); color: var(--lc-text); }
  </style>
</head>
<body class="min-h-screen antialiased font-sans">

  <header style="border-bottom: 1px solid var(--lc-border)" class="px-4 py-3 flex items-center justify-between">
    <nav class="flex items-center gap-5 text-sm">
      <span class="font-semibold">Manhwa</span>
      <a href="{{ request.url_for('index') }}"
         style="color: var(--lc-muted)" class="hover:opacity-100 transition-opacity">Browse</a>
      <a href="{{ request.url_for('reading_list') }}"
         style="color: var(--lc-muted)" class="hover:opacity-100 transition-opacity">My List</a>
    </nav>
  </header>

  <main class="px-4 py-6 max-w-5xl mx-auto">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
