services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      # Binds to loopback only — nginx (host) terminates TLS and proxies here.
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - laziness

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    environment:
      # v2 uses APP_URL (not PUBLIC_APP_URL) for WebAuthn RP ID computation
      APP_URL: "https://auth.lazy.lovey.tv"
      # Keep PUBLIC_APP_URL for any v1 compat paths still present
      PUBLIC_APP_URL: "https://auth.lazy.lovey.tv"
      TRUST_PROXY: "true"
      ENCRYPTION_KEY: "${POCKET_ID_ENCRYPTION_KEY}"
    volumes:
      - pocket_id_data:/app/data
    networks:
      - laziness

  center:
    build:
      context: ./center
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://center:${CENTER_DB_PASSWORD}@postgres:5432/laziness?options=-csearch_path%3Dcenter"
    depends_on:
      - postgres
      - redis
      - pocket-id
    networks:
      - laziness

  meals:
    build:
      context: .
      dockerfile: modules/meals/Dockerfile
    restart: unless-stopped
    environment:
      # DB passed as individual vars — avoids URL-encoding issues with base64 passwords
      MEALS_DB_PASSWORD: "${MEALS_DB_PASSWORD}"
      # Redis password passed separately so sdk.ts can encodeURIComponent it
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CENTER_INTERNAL_URL: "http://center:3000"
      MEALS_DEFAULT_USER: "${MEALS_DEFAULT_USER}"
      MEALS_RECENT_COOK_DAYS: "7"
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
      - center
    networks:
      - laziness

  pantry:
    build:
      context: .
      dockerfile: modules/pantry/Dockerfile
    restart: unless-stopped
    environment:
      # DB passed as individual vars — avoids URL-encoding issues with base64 passwords
      PANTRY_DB_PASSWORD: "${PANTRY_DB_PASSWORD}"
      # Redis password passed separately so sdk.ts can encodeURIComponent it
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CENTER_INTERNAL_URL: "http://center:3000"
      PANTRY_DEFAULT_USER: "${PANTRY_DEFAULT_USER}"
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
      - center
    networks:
      - laziness

  manhwa:
    build:
      context: ./modules/manhwa
    restart: unless-stopped
    environment:
      # Pass DB credentials as separate vars — avoids URL-encoding issues
      # when passwords contain base64 special chars (/, +, =)
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: laziness
      MANHWA_DB_PASSWORD: "${MANHWA_DB_PASSWORD}"
      CENTER_INTERNAL_URL: "http://center:3000"
      MANHWA_DEFAULT_USER: "${MANHWA_DEFAULT_USER}"
      MANHWA_ROOT_PATH: "/manhwa"
    depends_on:
      - postgres
      - center
    networks:
      - laziness

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: laziness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      CENTER_DB_PASSWORD: "${CENTER_DB_PASSWORD}"
      MANHWA_DB_PASSWORD: "${MANHWA_DB_PASSWORD}"
      MEALS_DB_PASSWORD: "${MEALS_DB_PASSWORD}"
      PANTRY_DB_PASSWORD: "${PANTRY_DB_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      - laziness

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - laziness

networks:
  laziness:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  pocket_id_data:
  postgres_data:
  redis_data:
